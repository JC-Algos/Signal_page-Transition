<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Algos - 技術分析</title>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0d4f4f;
            --primary-light: #14b8a6;
            --secondary: #06b6d4;
            --accent: #22d3ee;
            --dark: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Login Container */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(20, 184, 166, 0.15);
            border: 1px solid rgba(20, 184, 166, 0.2);
        }

        /* Main Container */
        .main-container {
            display: none;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #0d7377 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Cards */
        .card-dark {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(34, 211, 238, 0.1);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .card-dark h5 {
            color: var(--accent);
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Input Styles */
        .form-control-dark {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.2);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
        }

        .form-control-dark:focus {
            background: rgba(30, 41, 59, 0.9);
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
            color: #fff;
        }

        .form-control-dark::placeholder {
            color: #64748b;
        }

        .form-select-dark {
            background: rgba(30, 41, 59, 0.8) url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2322d3ee' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e") no-repeat right 12px center/16px 12px;
            border: 1px solid rgba(34, 211, 238, 0.2);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 12px 40px 12px 16px;
        }

        .form-select-dark:focus {
            background-color: rgba(30, 41, 59, 0.9);
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
            color: #fff;
        }

        /* Buttons */
        .btn-cyan {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-light) 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            transition: all 0.3s ease;
        }

        .btn-cyan:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.4);
            color: white;
        }

        .btn-outline-cyan {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--secondary);
            border-radius: 10px;
            padding: 10px 22px;
            transition: all 0.3s ease;
        }

        .btn-outline-cyan:hover {
            background: var(--secondary);
            color: white;
        }

        /* Analysis Result */
        .result-section {
            display: none;
        }

        .report-box {
            background: rgba(6, 78, 78, 0.3);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            padding: 20px;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
        }

        .report-box::-webkit-scrollbar {
            width: 8px;
        }

        .report-box::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .report-box::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 4px;
        }

        /* Chart Display */
        .chart-container {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        .chart-container h6 {
            color: var(--accent);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .chart-container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .chart-container img:hover {
            transform: scale(1.02);
        }

        /* Quick Stats */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .stat-item {
            background: rgba(6, 182, 212, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(34, 211, 238, 0.15);
        }

        .stat-item .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-top: 4px;
        }

        .stat-item .sub {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 2px;
        }

        .text-bullish { color: #10b981; font-weight: 600; }
        .text-bearish { color: #ef4444; font-weight: 600; }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner-custom {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(6, 182, 212, 0.2);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Messages */
        .message-success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .message-error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .message-info {
            background: rgba(6, 182, 212, 0.15);
            color: #67e8f9;
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Modal for enlarged charts */
        .chart-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }

        .chart-modal img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }

        .chart-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Form labels */
        .form-label {
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <h3 class="text-center mb-4">
            <span style="background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-light) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">JC Algos</span>
        </h3>
        <p class="text-center text-muted mb-4">技術分析系統登入</p>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">電子郵件</label>
                <input type="email" class="form-control form-control-dark" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密碼</label>
                <input type="password" class="form-control form-control-dark" id="password" required>
            </div>
            <button type="submit" class="btn btn-cyan w-100">登入</button>
            <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
        </form>
    </div>

    <!-- Premium Required Message -->
    <div class="login-container" id="premiumRequired" style="display: none;">
        <div class="text-center">
            <h3 class="mb-4">🔒 僅限付費會員</h3>
            <p class="text-muted mb-4">此功能僅供付費會員使用。</p>
            <p class="mb-4">請訂閱會員以解鎖全部功能。</p>
            <div class="d-grid gap-2">
                <a href="index.html" class="btn btn-cyan">
                    <i class="bi bi-house-door me-2"></i>返回首頁訂閱
                </a>
                <button class="btn btn-outline-cyan" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i>登出
                </button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container-fluid main-container" id="mainContainer">
        <!-- Header -->
        <div class="header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h1><i class="bi bi-graph-up-arrow me-2"></i>技術分析</h1>
                    <p>Technical Analysis | 趨勢分析 · 成交量分析 · 資產輪動</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="index.html" class="btn btn-outline-cyan">
                        <i class="bi bi-house-door"></i> 首頁
                    </a>
                    <a href="signals.html" class="btn btn-outline-cyan">
                        <i class="bi bi-broadcast"></i> 信號
                    </a>
                    <button class="btn btn-outline-cyan" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> 登出
                    </button>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Input Panel -->
            <div class="col-lg-3 col-md-4">
                <div class="card-dark" style="position: sticky; top: 20px;">
                    <h5><i class="bi bi-search me-2"></i>股票查詢</h5>

                    <div class="mb-3">
                        <label for="ticker" class="form-label">股票代碼</label>
                        <input type="text" class="form-control form-control-dark" id="ticker" 
                               placeholder="例如: 0700, AAPL" autocomplete="off">
                    </div>

                    <div class="mb-4">
                        <label for="market" class="form-label">市場</label>
                        <select class="form-select form-select-dark" id="market">
                            <option value="HK">香港 (HKEX)</option>
                            <option value="US">美國 (NYSE/NASDAQ)</option>
                        </select>
                    </div>

                    <button class="btn btn-cyan w-100 mb-3" id="analyzeBtn" onclick="runAnalysis()">
                        <i class="bi bi-lightning-charge me-2"></i>開始分析
                    </button>

                    <div class="mb-3">
                        <small class="text-muted">快速選擇熱門股票:</small>
                        <div class="d-flex flex-wrap gap-2 mt-2">
                            <button class="btn btn-sm btn-outline-cyan" onclick="quickSelect('0700', 'HK')">騰訊</button>
                            <button class="btn btn-sm btn-outline-cyan" onclick="quickSelect('9988', 'HK')">阿里</button>
                            <button class="btn btn-sm btn-outline-cyan" onclick="quickSelect('9618', 'HK')">京東</button>
                            <button class="btn btn-sm btn-outline-cyan" onclick="quickSelect('NVDA', 'US')">NVDA</button>
                            <button class="btn btn-sm btn-outline-cyan" onclick="quickSelect('AAPL', 'US')">AAPL</button>
                            <button class="btn btn-sm btn-outline-cyan" onclick="quickSelect('TSLA', 'US')">TSLA</button>
                        </div>
                    </div>

                    <hr style="border-color: rgba(34, 211, 238, 0.2);">

                    <div id="quickStats" style="display: none;">
                        <h5><i class="bi bi-speedometer2 me-2"></i>快速數據</h5>
                        <div class="stat-grid" id="statsGrid">
                            <!-- Stats will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Results Panel -->
            <div class="col-lg-9 col-md-8">
                <div id="messageArea"></div>

                <!-- Loading -->
                <div id="loadingArea" class="card-dark loading-spinner" style="display: none;">
                    <div class="spinner-custom mx-auto"></div>
                    <p class="mt-4" id="loadingText">正在分析中...</p>
                </div>

                <!-- Results -->
                <div id="resultSection" class="result-section">
                    <!-- Charts Row -->
                    <div class="row mb-4">
                        <div class="col-lg-6">
                            <div class="chart-container">
                                <h6><i class="bi bi-bar-chart-fill me-2"></i>技術圖表 (6M)</h6>
                                <img id="technicalChart" src="" alt="Technical Chart" onclick="enlargeChart(this)">
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="chart-container">
                                <h6><i class="bi bi-pie-chart-fill me-2"></i>RRG 資產輪動圖</h6>
                                <img id="rrgChart" src="" alt="RRG Chart" onclick="enlargeChart(this)">
                            </div>
                        </div>
                    </div>

                    <!-- TA Report -->
                    <div class="card-dark">
                        <h5><i class="bi bi-file-text me-2"></i>技術分析報告</h5>
                        <div class="report-box" id="reportContent">
                            <!-- Report will be inserted here -->
                        </div>
                    </div>
                </div>

                <!-- Initial State -->
                <div id="initialState" class="card-dark text-center py-5">
                    <i class="bi bi-graph-up-arrow" style="font-size: 4rem; color: var(--secondary); opacity: 0.5;"></i>
                    <h4 class="mt-4" style="color: #64748b;">輸入股票代碼開始分析</h4>
                    <p class="text-muted">支援港股 (HKEX) 及美股 (NYSE/NASDAQ)</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart Modal -->
    <div class="chart-modal" id="chartModal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img id="modalImage" src="">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==================== CONFIGURATION ====================
        const SUPABASE_URL = 'https://nwhyoravkuyiuewlfgfw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53aHlvcmF2a3V5aXVld2xmZ2Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3MTU5NTgsImV4cCI6MjA4MzI5MTk1OH0.kNjZpRwdYDLHNCjscq6suOGz2PNst8FNAVm5FsS87VI';
        const TA_API_BASE = 'https://ta.srv1295571.hstgr.cloud';

        // Initialize Supabase
        let supabaseClient = null;
        if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // DOM Elements
        const loginContainer = document.getElementById('loginContainer');
        const premiumRequired = document.getElementById('premiumRequired');
        const mainContainer = document.getElementById('mainContainer');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        // ==================== AUTH LOGIC ====================

        async function checkPremiumStatus(userId) {
            try {
                const { data: profile, error } = await supabaseClient
                    .from('user_profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error) return false;

                const dbStatus = (profile.membership_status || '').toLowerCase().trim();
                const stripeActive = profile.subscription_status === 'active';
                return (dbStatus === 'premium') || (dbStatus === 'active') || stripeActive;
            } catch (err) {
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Check URL params for ticker
            const urlParams = new URLSearchParams(window.location.search);
            const tickerParam = urlParams.get('ticker');
            const marketParam = urlParams.get('market');
            
            if (tickerParam) {
                document.getElementById('ticker').value = tickerParam.toUpperCase();
            }
            if (marketParam) {
                document.getElementById('market').value = marketParam.toUpperCase();
            }

            // Enter key to submit
            document.getElementById('ticker').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    runAnalysis();
                }
            });

            // Check auth
            try {
                if (!supabaseClient) {
                    showLogin();
                    return;
                }
                const { data: { user } } = await supabaseClient.auth.getUser();
                
                if (user) {
                    const isPremium = await checkPremiumStatus(user.id);
                    if (isPremium) {
                        showDashboard();
                        // Auto-analyze if ticker in URL
                        if (tickerParam) {
                            runAnalysis();
                        }
                    } else {
                        showPremiumRequired();
                    }
                } else {
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        });

        if (loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                const btn = loginForm.querySelector('button');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登入中...';
                loginError.style.display = 'none';

                try {
                    if (!supabaseClient) throw new Error('系統未就緒');

                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email, password
                    });
                    
                    if (error) throw error;
                    
                    const isPremium = await checkPremiumStatus(data.user.id);
                    if (isPremium) {
                        showDashboard();
                    } else {
                        showPremiumRequired();
                    }
                } catch (err) {
                    loginError.textContent = err.message || '登入失敗';
                    loginError.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });
        }

        function logout() {
            if (supabaseClient) supabaseClient.auth.signOut();
            window.location.reload();
        }

        function showDashboard() {
            loginContainer.style.display = 'none';
            premiumRequired.style.display = 'none';
            mainContainer.style.display = 'block';
        }

        function showLogin() {
            loginContainer.style.display = 'block';
            premiumRequired.style.display = 'none';
            mainContainer.style.display = 'none';
        }

        function showPremiumRequired() {
            loginContainer.style.display = 'none';
            premiumRequired.style.display = 'block';
            mainContainer.style.display = 'none';
        }

        // ==================== ANALYSIS FUNCTIONS ====================

        function quickSelect(ticker, market) {
            document.getElementById('ticker').value = ticker;
            document.getElementById('market').value = market;
            runAnalysis();
        }

        async function runAnalysis() {
            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            const market = document.getElementById('market').value;

            if (!ticker) {
                showMessage('請輸入股票代碼', 'error');
                return;
            }

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('ticker', ticker);
            url.searchParams.set('market', market);
            window.history.pushState({}, '', url);

            showLoading(true, `正在分析 ${ticker} (${market})...`);
            hideMessage();
            document.getElementById('initialState').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('quickStats').style.display = 'none';

            try {
                const response = await fetch(`${TA_API_BASE}/api/ta/analyze?ticker=${ticker}&market=${market}`);
                const data = await response.json();

                showLoading(false);

                if (data.success) {
                    displayResults(data);
                    showMessage(`${data.data.name || ticker} 分析完成`, 'success');
                } else {
                    showMessage(data.error || '分析失敗', 'error');
                    document.getElementById('initialState').style.display = 'block';
                }
            } catch (error) {
                showLoading(false);
                showMessage(`連接錯誤: ${error.message}`, 'error');
                document.getElementById('initialState').style.display = 'block';
            }
        }

        function displayResults(data) {
            // Show result section
            document.getElementById('resultSection').style.display = 'block';

            // Display report
            document.getElementById('reportContent').textContent = data.report || '無報告數據';

            // Display charts
            if (data.charts.technical) {
                document.getElementById('technicalChart').src = TA_API_BASE + data.charts.technical;
                document.getElementById('technicalChart').style.display = 'block';
            } else {
                document.getElementById('technicalChart').style.display = 'none';
            }

            if (data.charts.rrg) {
                document.getElementById('rrgChart').src = TA_API_BASE + data.charts.rrg;
                document.getElementById('rrgChart').style.display = 'block';
            } else {
                document.getElementById('rrgChart').style.display = 'none';
            }

            // Display quick stats
            if (data.data) {
                displayQuickStats(data.data);
            }
        }

        function displayQuickStats(analysisData) {
            const statsGrid = document.getElementById('statsGrid');
            const price = analysisData.price || {};
            const rrg = analysisData.rrg || {};
            const rs = analysisData.rs_ranking || {};
            const volume = analysisData.volume_profile || {};

            const changeClass = price.change_pct >= 0 ? 'text-bullish' : 'text-bearish';
            const changeSign = price.change_pct >= 0 ? '+' : '';

            statsGrid.innerHTML = `
                <div class="stat-item">
                    <div class="label">現價</div>
                    <div class="value">${price.current || '--'}</div>
                    <div class="sub ${changeClass}">${changeSign}${price.change_pct?.toFixed(2) || 0}%</div>
                </div>
                <div class="stat-item">
                    <div class="label">RS 排名</div>
                    <div class="value">#${rs.current_rank || '--'}</div>
                    <div class="sub">/ ${rs.total_stocks || '--'}</div>
                </div>
                <div class="stat-item">
                    <div class="label">RS-Ratio</div>
                    <div class="value">${rrg.rs_ratio || '--'}</div>
                    <div class="sub">${rrg.quadrant_zh || ''}</div>
                </div>
                <div class="stat-item">
                    <div class="label">PoC</div>
                    <div class="value">${volume.poc || '--'}</div>
                    <div class="sub">${volume.position_zh || ''}</div>
                </div>
            `;

            document.getElementById('quickStats').style.display = 'block';
        }

        // ==================== UI HELPERS ====================

        function showLoading(show, text = '分析中...') {
            document.getElementById('loadingArea').style.display = show ? 'block' : 'none';
            document.getElementById('loadingText').textContent = text;
            document.getElementById('analyzeBtn').disabled = show;
        }

        function showMessage(text, type) {
            const messageArea = document.getElementById('messageArea');
            const iconMap = {
                success: 'check-circle',
                error: 'x-circle',
                info: 'info-circle'
            };
            messageArea.innerHTML = `<div class="message-${type}"><i class="bi bi-${iconMap[type]} me-2"></i>${text}</div>`;
        }

        function hideMessage() {
            document.getElementById('messageArea').innerHTML = '';
        }

        function enlargeChart(imgElement) {
            const modal = document.getElementById('chartModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = imgElement.src;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('chartModal').style.display = 'none';
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
