<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Algos 沽空報告</title>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0d4f4f;
            --primary-light: #14b8a6;
            --secondary: #06b6d4;
            --accent: #22d3ee;
            --dark: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Login Container */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(20, 184, 166, 0.15);
            border: 1px solid rgba(20, 184, 166, 0.2);
        }

        /* Main Container */
        .main-container {
            display: none;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #0d7377 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Cards */
        .card-dark {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(34, 211, 238, 0.1);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .card-dark h5 {
            color: var(--accent);
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Input Styles */
        .form-control-dark {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.2);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
        }

        .form-control-dark:focus {
            background: rgba(30, 41, 59, 0.9);
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
            color: #fff;
        }

        /* Buttons */
        .btn-cyan {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-light) 100%);
            border: none;
            color: white;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-cyan:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4);
            color: white;
        }

        .btn-outline-cyan {
            border: 1px solid var(--secondary);
            color: var(--secondary);
            background: transparent;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-outline-cyan:hover {
            background: var(--secondary);
            color: white;
        }

        /* Data Cards */
        .data-card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        .data-card-blue {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(37, 99, 235, 0.1));
            border-color: rgba(59, 130, 246, 0.3);
        }

        .data-card-amber {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(217, 119, 6, 0.1));
            border-color: rgba(245, 158, 11, 0.3);
        }

        .data-card-purple {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(124, 58, 237, 0.1));
            border-color: rgba(139, 92, 246, 0.3);
        }

        /* Stock Rows */
        .stock-row {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .stock-row:hover {
            background: rgba(34, 211, 238, 0.1);
        }

        .rank-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            margin-right: 12px;
        }

        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffec8b); color: #8b6914; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #666; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #daa06d); color: #5c3317; }
        .rank-other { background: rgba(100, 116, 139, 0.3); color: #94a3b8; }

        .pct-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .pct-high { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .pct-medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .pct-low { background: rgba(16, 185, 129, 0.2); color: #34d399; }

        /* Loading */
        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(34, 211, 238, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Labels */
        .label-blue { color: #60a5fa; }
        .label-amber { color: #fbbf24; }
        .label-purple { color: #a78bfa; }

        .text-danger-light { color: #f87171; }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <h3 class="text-center mb-4">
            <span style="background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-light) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">JC Algos</span>
        </h3>
        <p class="text-center text-muted mb-4">沽空報告系統登入</p>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">電子郵件</label>
                <input type="email" class="form-control form-control-dark" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密碼</label>
                <input type="password" class="form-control form-control-dark" id="password" required>
            </div>
            <button type="submit" class="btn btn-cyan w-100">登入</button>
            <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
        </form>
        <div class="text-center mt-4">
            <a href="index.html" class="text-muted small">返回首頁註冊</a>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container-fluid main-container" id="mainContainer">
        <!-- Header -->
        <div class="header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h1><i class="bi bi-graph-down-arrow me-2"></i>JC Algos 沽空報告</h1>
                    <p>Short Selling Report | 累計倉位 · 今日成交 · Top 20 排行</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="index.html" class="btn btn-outline-cyan">
                        <i class="bi bi-house-door"></i> 首頁
                    </a>
                    <button class="btn btn-outline-cyan" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> 登出
                    </button>
                </div>
            </div>
        </div>

        <!-- Part 1: Stock Lookup -->
        <div class="card-dark">
            <h5><i class="bi bi-search me-2"></i>個股沽空查詢</h5>
            
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control form-control-dark" id="tickerInput" 
                               placeholder="輸入股票代碼 (例如: 700, 9988, 2318)"
                               onkeypress="if(event.key==='Enter')lookupStock()">
                        <button class="btn btn-cyan" onclick="lookupStock()">
                            <i class="bi bi-search me-1"></i> 查詢
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div id="lookupResults" style="display: none;">
                <div class="row g-3">
                    <!-- Aggregate Position -->
                    <div class="col-md-3">
                        <div class="data-card data-card-blue h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="label-blue fw-semibold">📊 累計沽空倉位</span>
                                <small id="aggregateDate" class="text-muted"></small>
                            </div>
                            <div id="aggregateData"></div>
                        </div>
                    </div>
                    
                    <!-- Daily Short -->
                    <div class="col-md-3">
                        <div class="data-card data-card-amber h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="label-amber fw-semibold">📉 今日沽空成交</span>
                                <small id="dailyDate" class="text-muted"></small>
                            </div>
                            <div id="dailyData"></div>
                        </div>
                    </div>
                    
                    <!-- Historical Chart -->
                    <div class="col-md-6">
                        <div class="data-card data-card-purple h-100">
                            <div class="text-center label-purple fw-semibold mb-2">📈 累計沽空倉位走勢</div>
                            <div id="stockChart" style="height: 180px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="lookupLoading" class="text-center py-4" style="display: none;">
                <div class="loading"></div>
                <p class="text-muted mt-2 mb-0">正在查詢數據...</p>
            </div>
            
            <div id="lookupError" class="alert alert-danger mt-3" style="display: none;"></div>
        </div>

        <!-- Part 2: Top 20 Lists -->
        <div class="card-dark">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-trophy me-2"></i>沽空排行榜 Top 20</h5>
                <button class="btn btn-outline-cyan btn-sm" onclick="loadTop20()">
                    <i class="bi bi-arrow-clockwise me-1"></i> 刷新
                </button>
            </div>
            
            <div id="top20Loading" class="text-center py-5">
                <div class="loading"></div>
                <p class="text-muted mt-2 mb-0">正在載入排行榜...</p>
            </div>
            
            <div id="top20Content" style="display: none;">
                <div class="row g-4 mt-2">
                    <!-- Daily Top 20 -->
                    <div class="col-md-6">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="label-amber fw-semibold">📉 今日沽空成交 Top 20</span>
                            <small id="dailyTop20Date" class="text-muted"></small>
                        </div>
                        <small class="text-muted d-block mb-2">按 %流通股 排名</small>
                        <div id="dailyTop20List"></div>
                    </div>
                    
                    <!-- Aggregate Top 20 -->
                    <div class="col-md-6">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="label-blue fw-semibold">📊 累計沽空倉位 Top 20</span>
                            <small id="aggregateTop20Date" class="text-muted"></small>
                        </div>
                        <small class="text-muted d-block mb-2">按 %流通股 排名</small>
                        <div id="aggregateTop20List"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-muted py-4">
            <p class="mb-1">© 2026 JC Algos. 數據僅供參考，不構成投資建議。</p>
            <small>累計數據來源: SFC 證監會 | 每日數據來源: HKEX 港交所</small>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const SUPABASE_URL = 'https://nwhyoravkuyiuewlfgfw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53aHlvcmF2a3V5aXVld2xmZ2Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3MTU5NTgsImV4cCI6MjA4MzI5MTk1OH0.kNjZpRwdYDLHNCjscq6suOGz2PNst8FNAVm5FsS87VI';
        const API_BASE = 'https://short.srv1295571.hstgr.cloud';

        let supabaseClient = null;
        if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // DOM Elements
        const loginContainer = document.getElementById('loginContainer');
        const mainContainer = document.getElementById('mainContainer');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        // ==================== AUTH LOGIC ====================
        async function checkUserAccess(userId) {
            try {
                const { data: profile, error } = await supabaseClient
                    .from('user_profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        return { hasAccess: true, tier: 'free' };
                    }
                    return { hasAccess: false, tier: null };
                }

                return { hasAccess: true, tier: profile.membership_status || 'free' };
            } catch (err) {
                return { hasAccess: false, tier: null };
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (!supabaseClient) {
                    showLogin();
                    return;
                }
                const { data: { user } } = await supabaseClient.auth.getUser();
                
                if (user) {
                    const access = await checkUserAccess(user.id);
                    if (access.hasAccess) {
                        showDashboard();
                    } else {
                        showLogin();
                    }
                } else {
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        });

        if (loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                const btn = loginForm.querySelector('button');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登入中...';
                loginError.style.display = 'none';

                try {
                    if (!supabaseClient) throw new Error('系統未就緒');
                    
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    const access = await checkUserAccess(data.user.id);
                    if (access.hasAccess) {
                        showDashboard();
                    } else {
                        throw new Error('無法驗證帳戶');
                    }
                } catch (err) {
                    loginError.textContent = err.message || '登入失敗';
                    loginError.style.display = 'block';
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });
        }

        function logout() {
            if (supabaseClient) supabaseClient.auth.signOut();
            showLogin();
        }

        function showDashboard() {
            loginContainer.style.display = 'none';
            mainContainer.style.display = 'block';
            loadTop20();
        }

        function showLogin() {
            loginContainer.style.display = 'block';
            mainContainer.style.display = 'none';
        }

        // ==================== SHORT SELLING LOGIC ====================
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function getPctClass(pct, isDaily = false) {
            if (isDaily) {
                if (pct >= 0.5) return 'pct-high';
                if (pct >= 0.2) return 'pct-medium';
                return 'pct-low';
            } else {
                if (pct >= 15) return 'pct-high';
                if (pct >= 8) return 'pct-medium';
                return 'pct-low';
            }
        }

        async function lookupStock() {
            const ticker = document.getElementById('tickerInput').value.trim();
            if (!ticker) return;
            
            document.getElementById('lookupResults').style.display = 'none';
            document.getElementById('lookupError').style.display = 'none';
            document.getElementById('lookupLoading').style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/api/short/lookup?ticker=${ticker}`);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                displayLookupResults(data);
            } catch (error) {
                document.getElementById('lookupError').textContent = '查詢失敗: ' + error.message;
                document.getElementById('lookupError').style.display = 'block';
            } finally {
                document.getElementById('lookupLoading').style.display = 'none';
            }
        }

        function displayLookupResults(data) {
            const stockName = data.chinese_name || data.stock_code;
            
            // Aggregate data
            const aggEl = document.getElementById('aggregateData');
            if (data.aggregate && data.aggregate.found) {
                const agg = data.aggregate;
                document.getElementById('aggregateDate').textContent = agg.report_date || '';
                aggEl.innerHTML = `
                    <div class="fs-5 fw-bold text-white">${stockName}</div>
                    <div class="small text-muted mb-2">${data.stock_code}.HK</div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <small class="text-muted d-block">沽空股數</small>
                            <span class="fw-semibold">${formatNumber(agg.short_shares)}</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block">沽空金額</small>
                            <span class="fw-semibold">$${formatNumber(agg.short_value_hkd || 0)}</span>
                        </div>
                    </div>
                    <small class="text-muted d-block">佔流通股</small>
                    <span class="fs-4 fw-bold ${data.aggregate.pct_of_float >= 10 ? 'text-danger-light' : 'text-white'}">
                        ${data.aggregate.pct_of_float ? data.aggregate.pct_of_float.toFixed(2) + '%' : 'N/A'}
                    </span>
                `;
            } else {
                aggEl.innerHTML = `
                    <div class="fs-5 fw-bold text-white">${stockName}</div>
                    <div class="small text-muted mb-2">${data.stock_code}.HK</div>
                    <div class="mt-3 label-blue">NIL - 未有申報沽空倉位</div>
                `;
            }
            
            // Daily data
            const dailyEl = document.getElementById('dailyData');
            if (data.daily && data.daily.found) {
                const daily = data.daily;
                document.getElementById('dailyDate').textContent = daily.trading_date || '';
                dailyEl.innerHTML = `
                    <div class="fs-5 fw-bold text-white">${stockName}</div>
                    <div class="small text-muted mb-2">${data.stock_code}.HK</div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <small class="text-muted d-block">沽空股數</small>
                            <span class="fw-semibold">${formatNumber(daily.short_shares)}</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block">沽空金額</small>
                            <span class="fw-semibold">$${formatNumber(daily.short_value)}</span>
                        </div>
                    </div>
                    <small class="text-muted d-block">佔流通股</small>
                    <span class="fs-4 fw-bold text-white">
                        ${data.daily.pct_of_float ? data.daily.pct_of_float.toFixed(4) + '%' : 'N/A'}
                    </span>
                `;
            } else {
                dailyEl.innerHTML = `
                    <div class="fs-5 fw-bold text-white">${stockName}</div>
                    <div class="small text-muted mb-2">${data.stock_code}.HK</div>
                    <div class="mt-3 label-amber">NIL - 今日未有沽空記錄</div>
                `;
            }
            
            drawStockChart(data);
            document.getElementById('lookupResults').style.display = 'block';
        }

        function drawStockChart(data) {
            const historicalAgg = data.historical_aggregate || [];
            
            if (historicalAgg.length === 0) {
                document.getElementById('stockChart').innerHTML = '<div class="text-center text-muted py-4">暫無歷史數據</div>';
                return;
            }
            
            const dates = historicalAgg.map(d => d.date);
            
            const aggTrace = {
                x: dates,
                y: historicalAgg.map(d => d.pct_of_float || 0),
                text: dates,
                customdata: historicalAgg.map(d => d.pct_of_float ? `${d.pct_of_float}%` : ''),
                hovertemplate: '%{text}<br>%{customdata}<extra></extra>',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#a78bfa', width: 2 },
                marker: { size: 6, color: '#a78bfa' },
                fill: 'tozeroy',
                fillcolor: 'rgba(167, 139, 250, 0.1)',
                showlegend: false
            };
            
            const layout = {
                showlegend: false,
                margin: { t: 10, r: 15, b: 60, l: 45 },
                xaxis: { 
                    tickangle: -45,
                    tickfont: { size: 9, color: '#94a3b8' },
                    showgrid: false,
                    tickmode: 'array',
                    tickvals: dates,
                    ticktext: dates.map(d => d.slice(5)),
                    linecolor: 'rgba(148, 163, 184, 0.2)'
                },
                yaxis: { 
                    title: { text: '% 流通股', font: { size: 10, color: '#94a3b8' } },
                    tickfont: { size: 9, color: '#94a3b8' },
                    ticksuffix: '%',
                    showgrid: true,
                    gridcolor: 'rgba(148, 163, 184, 0.1)',
                    linecolor: 'rgba(148, 163, 184, 0.2)'
                },
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                font: { family: 'Inter, Noto Sans TC, sans-serif' }
            };
            
            Plotly.newPlot('stockChart', [aggTrace], layout, { responsive: true, displayModeBar: false });
        }

        async function loadTop20() {
            document.getElementById('top20Loading').style.display = 'block';
            document.getElementById('top20Content').style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/api/short/top20`);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                displayTop20(data);
            } catch (error) {
                console.error('Failed to load top 20:', error);
            } finally {
                document.getElementById('top20Loading').style.display = 'none';
            }
        }

        function displayTop20(data) {
            // Daily Top 20
            document.getElementById('dailyTop20Date').textContent = data.daily.trading_date;
            document.getElementById('dailyTop20List').innerHTML = data.daily.stocks.map((stock, i) => `
                <div class="stock-row" onclick="document.getElementById('tickerInput').value='${stock.stock_code}';lookupStock();">
                    <div class="rank-badge ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i + 1}</div>
                    <div class="flex-grow-1">
                        <div class="fw-medium text-white">${stock.chinese_name || stock.stock_name}</div>
                        <small class="text-muted">${stock.stock_code}.HK</small>
                    </div>
                    <div class="text-end">
                        <div class="pct-badge ${getPctClass(stock.pct_of_float, true)}">${stock.pct_of_float.toFixed(2)}%</div>
                        <small class="text-muted d-block mt-1">$${formatNumber(stock.short_value)}</small>
                    </div>
                </div>
            `).join('');
            
            // Aggregate Top 20
            document.getElementById('aggregateTop20Date').textContent = data.aggregate.report_date;
            document.getElementById('aggregateTop20List').innerHTML = data.aggregate.stocks.map((stock, i) => `
                <div class="stock-row" onclick="document.getElementById('tickerInput').value='${stock.stock_code}';lookupStock();">
                    <div class="rank-badge ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i + 1}</div>
                    <div class="flex-grow-1">
                        <div class="fw-medium text-white">${stock.chinese_name || stock.stock_name}</div>
                        <small class="text-muted">${stock.stock_code}.HK</small>
                    </div>
                    <div class="text-end">
                        <div class="pct-badge ${getPctClass(stock.short_pct_of_float, false)}">${stock.short_pct_of_float.toFixed(1)}%</div>
                        <small class="text-muted d-block mt-1">$${formatNumber(stock.short_value_hkd)}</small>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('top20Content').style.display = 'block';
        }
    </script>
</body>
</html>
